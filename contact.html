<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | HARA CAT STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'] } } } }
    </script>
</head>

<body class="font-sans bg-gray-50 text-gray-900">

    <!-- Header -->
    <header class="p-6">
        <a href="index.html" class="text-sm font-bold text-gray-500 hover:text-gray-900 uppercase tracking-widest transition">← BACK TO HOME</a>
    </header>

    <!-- Main Content (상단 간격 조절을 위해 py-4로 축소) -->
    <main class="max-w-5xl mx-auto px-6 py-4">
        <div class="grid lg:grid-cols-[1fr_400px] gap-12 items-start">
            
            <!-- Form Area -->
            <section>
                <p class="text-xs font-bold text-indigo-600 uppercase tracking-[0.35em]">Contact</p>
                <h1 class="mt-2 text-4xl font-extrabold text-gray-950">Leave a note<br>for HARA CAT</h1>
                <p class="mt-2 text-gray-500 font-medium text-sm">Send a small idea or curious message.</p>

                <!-- Form Box -->
                <form class="mt-6 p-8 rounded-[2rem] bg-white border border-gray-100 shadow-xl space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">First Name</label>
                            <input type="text" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-100">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Last Name</label>
                            <input type="text" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-100">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Company</label>
                        <input type="text" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-100">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Email</label>
                        <input type="email" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-100">
                    </div>
                    <!-- 휴대폰 필드 추가 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Phone</label>
                        <input type="tel" placeholder="010-0000-0000" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-100">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Message</label>
                        <textarea rows="3" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-100"></textarea>
                    </div>
                    <button type="submit" class="w-full rounded-xl bg-gray-900 py-3 text-sm font-bold text-white hover:bg-black transition">Send a Note</button>
                </form>
            </section>

            <!-- Image Area -->
            <section class="hidden lg:block pt-16">
                <div class="rounded-[2rem] bg-white p-4 shadow-xl rotate-2">
                    <img src="images/contact.png" alt="HARA CAT" class="rounded-[1.5rem]">
                </div>
            </section>
        </div>
    </main>

</body>
</html>

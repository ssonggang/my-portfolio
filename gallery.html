<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | HARA CAT STUDIO</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>

<body class="font-sans bg-[#f8f8f8] text-gray-900">

  <main class="grid min-h-screen grid-cols-1 lg:grid-cols-[42%_58%]">

    <!-- Left fixed frame -->
    <section class="relative min-h-screen lg:sticky lg:top-0 bg-white p-6 lg:p-8">

    <a href="index.html"
        class="absolute left-6 top-6 z-20 text-sm font-bold text-gray-500 hover:text-gray-900 uppercase tracking-widest transition">
        ← Back to Home
    </a>

    <div class="flex h-screen items-start justify-center pt-20">
        <div class="w-full max-w-2xl rounded-[2rem] border border-gray-100 bg-white p-4 shadow-2xl shadow-gray-900/10">
        <img
            id="mainCatImage"
            src="images2/9.jpg"
            alt="Selected HARACAT artwork"
            class="h-[78vh] w-full rounded-[1.5rem] object-cover transition-all duration-500"
        >
        </div>
    </div>
    </section>

    <!-- Right gallery -->
    <section class="px-6 py-16 lg:px-14 lg:py-24">

      <p class="text-xs font-bold text-indigo-600 uppercase tracking-[0.35em]">
        Art Gallery
      </p>

      <h1 class="mt-3 text-5xl font-extrabold tracking-tight text-gray-950">
        From the Eyes<br>
        of HARA CAT
      </h1>

      <p class="mt-6 max-w-xl text-gray-500 font-medium leading-relaxed">
        조용히 바라보고, 오래 기억하고, 작은 장면을 그림으로 남깁니다.
        이미지를 클릭하면 왼쪽 액자에서 크게 볼 수 있어요.
      </p>

      <div class="cat-gallery mt-12 columns-1 sm:columns-2 xl:columns-3 gap-5 space-y-5">

        <img class="cat-thumb gallery-img" src="images2/1.jpg" alt="HARACAT artwork 1">
        <img class="cat-thumb gallery-img" src="images2/2.jpg" alt="HARACAT artwork 2">
        <img class="cat-thumb gallery-img" src="images2/3.jpg" alt="HARACAT artwork 3">
        <img class="cat-thumb gallery-img" src="images2/4.jpg" alt="HARACAT artwork 4">
        <img class="cat-thumb gallery-img" src="images2/5.jpg" alt="HARACAT artwork 5">
        <img class="cat-thumb gallery-img" src="images2/6.jpg" alt="HARACAT artwork 6">
        <img class="cat-thumb gallery-img" src="images2/7.jpg" alt="HARACAT artwork 7">
        <img class="cat-thumb gallery-img" src="images2/8.jpg" alt="HARACAT artwork 8">

      </div>
    </section>
  </main>

  <style>
    .gallery-img {
      width: 100%;
      margin-bottom: 1.25rem;
      border-radius: 1.5rem;
      object-fit: cover;
      cursor: pointer;
      box-shadow: 0 15px 30px rgba(15, 23, 42, 0.08);
      opacity: 0.88;
      transition: all 0.3s ease;
      break-inside: avoid;
    }

    .gallery-img:hover {
      opacity: 1;
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 25px 50px rgba(15, 23, 42, 0.14);
    }
  </style>

  <script>
    const mainCatImage = document.getElementById("mainCatImage");
    const catGallery = document.querySelector(".cat-gallery");

    catGallery.addEventListener("click", function(event) {
      if (event.target.classList.contains("cat-thumb")) {
        mainCatImage.src = event.target.src;

        const thumbs = document.querySelectorAll(".cat-thumb");
        thumbs.forEach(function(thumb) {
          thumb.classList.remove("ring-4", "ring-indigo-400", "opacity-100");
        });

        event.target.classList.add("ring-4", "ring-indigo-400", "opacity-100");
      }
    });
  </script>

</body>
</html>

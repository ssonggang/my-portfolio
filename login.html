<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HARA CAT STUDIO</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-stone-50 font-sans min-h-screen">

    <!-- Back -->
    <header class="absolute top-8 left-8 z-50">
        <a href="index.html"
           class="uppercase tracking-[0.2em] text-sm font-bold text-gray-500 hover:text-gray-900 transition">
            ← Back to Home
        </a>
    </header>


    <main class="min-h-screen flex items-center justify-center px-6 py-20">

        <div class="max-w-6xl w-full grid lg:grid-cols-2 gap-16 items-center">

            <!-- LEFT IMAGE -->
            <section class="hidden lg:flex justify-center">

                <div class="bg-white rounded-[40px] p-5 shadow-2xl border border-stone-200">

                    <img
                        src="images/login.png"
                        alt="HARA CAT Login"
                        class="w-[500px] h-[600px] object-cover rounded-[28px]"
                    >

                </div>

            </section>


            <!-- LOGIN CARD -->
            <section class="flex justify-center">

                <div class="w-full max-w-md bg-white/90 backdrop-blur-sm rounded-[36px]
                            shadow-xl border border-stone-200 p-10">

                    <!-- Logo -->
                    <div class="text-center mb-10">

                        <div class="text-sm tracking-[0.35em]
                                    uppercase font-bold text-indigo-500 mb-3">
                            HARA CAT STUDIO
                        </div>

                        <h1 class="text-4xl font-extrabold text-slate-900">
                            Welcome Back
                        </h1>

                        <p class="mt-4 text-gray-500 leading-relaxed">
                            Enter the quiet room of HARA CAT.<br>
                            Sign in to continue your journey.
                        </p>

                    </div>


                    <!-- Form -->
                    <form class="space-y-6">

                        <!-- Email -->
                        <div>

                            <label
                                class="block text-sm font-semibold text-gray-700 mb-2">

                                Email Address

                            </label>

                            <input
                                type="email"
                                placeholder="hello@haracat.com"
                                required

                                class="w-full rounded-2xl border border-stone-200
                                       px-5 py-4 bg-stone-50
                                       focus:outline-none
                                       focus:ring-2
                                       focus:ring-indigo-400
                                       transition"
                            >

                        </div>


                        <!-- Password -->
                        <div>

                            <div class="flex justify-between mb-2">

                                <label class="text-sm font-semibold text-gray-700">

                                    Password

                                </label>

                                <a href="#"
                                   class="text-sm text-indigo-500 font-semibold hover:underline">

                                    Forgot?

                                </a>

                            </div>

                            <input
                                type="password"
                                placeholder="••••••••"
                                required

                                class="w-full rounded-2xl border border-stone-200
                                       px-5 py-4 bg-stone-50
                                       focus:outline-none
                                       focus:ring-2
                                       focus:ring-indigo-400
                                       transition"
                            >

                        </div>


                        <!-- Button -->
                        <button
                            type="submit"

                            class="w-full py-4 rounded-2xl
                                   bg-slate-900 text-white
                                   font-bold text-lg

                                   hover:bg-slate-800
                                   hover:-translate-y-1

                                   transition duration-300">

                            Enter Studio

                        </button>

                    </form>


                    <!-- Footer -->
                    <div class="mt-10 text-center">

                        <p class="text-gray-500 text-sm">

                            Not a member yet?

                            <a href="#"
                               class="font-bold text-indigo-500 hover:underline">

                                Join the HARA CAT universe

                            </a>

                        </p>

                    </div>

                </div>

            </section>

        </div>

    </main>

</body>
</html>
